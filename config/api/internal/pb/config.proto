syntax = "proto3";
package dogma.config.api.v1;

option go_package = "github.com/dogmatiq/enginekit/config/api/internal/pb";

import "config/api/internal/pb/identity.proto";

message ApplicationConfig {
  Identity identity = 1;
  repeated HandlerConfig handlers = 2;
}

message HandlerConfig {
  Identity identity = 1;
  string type = 2;
  map<string, string> consumed = 3;
  map<string, string> produced = 4;
}

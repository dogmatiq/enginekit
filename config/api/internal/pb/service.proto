syntax = "proto3";
package dogma.config.api.v1;

option go_package = "github.com/dogmatiq/enginekit/config/api/internal/pb";

import "config/api/internal/pb/identity.proto";
import "config/api/internal/pb/config.proto";

// Config is a service for inspecting the configuration Dogma applications
// hosted by the engine on the server.
service Config {
  // ListApplicationIdentities returns the identity of all applications.
  rpc ListApplicationIdentities(ListApplicationIdentitiesRequest) returns (ListApplicationIdentitiesResponse);

  // ListApplications returns the full configuration of all applications.
  rpc ListApplications(ListApplicationsRequest) returns (ListApplicationsResponse);
}

message ListApplicationIdentitiesRequest{
}

message ListApplicationIdentitiesResponse{
  repeated Identity identities = 1;
}

message ListApplicationsRequest{
}

message ListApplicationsResponse{
  repeated ApplicationConfig applications = 1;
}

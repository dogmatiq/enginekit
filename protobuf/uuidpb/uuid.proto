edition = "2024";
package dogma.protobuf;

option go_package = "github.com/dogmatiq/enginekit/protobuf/uuidpb";

// UUID is a size-optimized representation of an RFC 9562 UUID.
message UUID {
  uint64 upper = 1 [features.field_presence = IMPLICIT];
  uint64 lower = 2 [features.field_presence = IMPLICIT];
}
